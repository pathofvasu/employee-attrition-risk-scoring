models:
  use_logistic_regression: true
  use_random_forest: true

logistic_regression:
  max_iter: 1000
  C: 0.5
  class_weight: "balanced"

random_forest:
  n_estimators: 150
  max_depth: 8
  min_samples_leaf: 5
  class_weight: "balanced"

training:
  cv_folds: 5
  calibration_cv: 3

threshold:
  default: 0.5
